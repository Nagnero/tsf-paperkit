experiment:
  name: exchange_rate_smoke
  seed: 42
  output_dir: results/exchange_rate_smoke

data:
  name: exchange_rate
  path: .cache/tsf-paperkit/datasets/candidate/exchange_rate/exchange_rate.csv
  timestamp_col: date
  target_cols: [OT]
  split:
    train: 0.7
    val: 0.1
    test: 0.2
  seq_len: 24
  pred_len: 12
  stride: 1
  scale: true

training:
  batch_size: 128
  epochs: 1
  learning_rate: 0.001
  device: auto

models:
  - name: naive
  - name: linear
  - name: dlinear
    params:
      moving_avg_kernel: 25
